sensitivity                         "0.4"
zoom_sensitivity_ratio              "1"
fps_max                             "0"

// Settings

    cl_autohelp                     "0"
    cl_use_opens_buy_menu           "0"
    cl_join_advertise               "2"
    gameinstructor_enable           "0"
    r_show_build_info               "0"

// Network

    rate                            "786432"
    cl_predict                      "1"
    cl_predictweapons               "1"
    mm_dedicated_search_maxping     "50"


// Viewmodels

    viewmodel_fov                       "68"
    viewmodel_offset_x                  "2"
    viewmodel_offset_y                  "2"
    viewmodel_offset_z                  "-2"
    viewmodel_presetpos                 "0"


    bind 1 "slot1; switchhandsright"
    bind 2 "slot2; switchhandsright"
    bind 3 "slot3; switchhandsleft"

    // Nades

        bind 4          "slot6; switchhandsleft" //nade only
        bind mouse5     "slot7; switchhandsleft" //flash only
        bind mouse4     "slot8; switchhandsleft" //smoke only
        bind 6          "slot9; switchhandsleft" //decoy only
        bind mouse3     "slot10; switchhandsleft" //molly only

// Binds

    // Mouse

        bind mouse1                         "+attack"
        bind mouse2                         "+attack2"
        bind mwheeldown                     "+jump"
        bind mwheelup                       "+jump"

    // Movement
        
        bind w          "+forward"
        bind a          "+left"
        bind s          "+back"
        bind d          "+right"
        bind ctrl       "+duck"
        bind shift      "+sprint"
        bind space      "+jump"

    // Interact

        bind e      "+use"
        bind r      "+reload"
        bind t      "+spray_menu"
        bind f      "+lookatweapon"
        bind g      "drop"
        bind q      "lastinv"
        bind b      "buymenu"

    // Comm

        bind y      "messagemode"
        bind u      "messagemode2"
        bind alt    "+voicerecord"

    // Stuff

        bind f3         "toggleconsole"
        bind z          "player_ping"

// Aliases

    alias dc                        "disconnect"
    alias qt                        "quit"

    // LJ - bind to mouse1 whenever u are LJing

        alias +LJ       "+duck; +jump; -forward; -back"
        alias -LJ       "-duck; -jump"

    // jump throw
        alias "+boing" "+jump"; 
        alias "+ding" "-attack; -attack2". 
        alias "+dong" "-jump"; alias "+ding" "-attack; -attack2"; alias "+dong" "-jump 

        bind "n" "+boing; +ding; +dong".
    
    // left right hand
        alias lh "togglehand" "lefthand"
        alias rh "togglehand" "righthand"

